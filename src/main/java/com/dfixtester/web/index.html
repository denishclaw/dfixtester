<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dFixTester Web Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">dFixTester Dashboard</span>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Nav Tabs -->
        <ul class="nav nav-tabs" id="testerTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="sessions-tab" data-bs-toggle="tab" data-bs-target="#sessions" type="button" role="tab">Sessions</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="send-tab" data-bs-toggle="tab" data-bs-target="#send" type="button" role="tab">Send Message</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="replay-tab" data-bs-toggle="tab" data-bs-target="#replay" type="button" role="tab">Replay</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tests-tab" data-bs-toggle="tab" data-bs-target="#tests" type="button" role="tab">Cucumber Tests</button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content border border-top-0 p-3 bg-white" id="myTabContent">
            
            <!-- Sessions Tab -->
            <div class="tab-pane fade show active" id="sessions" role="tabpanel">
                <button class="btn btn-sm btn-outline-secondary mb-3" onclick="loadSessions()">Refresh Sessions</button>
                <table class="table table-bordered table-striped" id="sessionTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Session String</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Send Message Tab -->
            <div class="tab-pane fade" id="send" role="tabpanel">
                <div class="mb-3">
                    <label for="sendSessionSelect" class="form-label">Target Session</label>
                    <select class="form-select w-50" id="sendSessionSelect"></select>
                </div>
                <div id="tagRows" class="mb-3">
                    <!-- Tag Input Rows appended here -->
                </div>
                <button class="btn btn-outline-primary mb-3" onclick="addTagRow()">+ Add Tag</button>
                <hr>
                <button class="btn btn-success" onclick="sendMessage()">Send FIX Message</button>
            </div>

            <!-- Replay Tab -->
            <div class="tab-pane fade" id="replay" role="tabpanel">
                <div class="mb-3">
                    <label for="replaySessionSelect" class="form-label">Target Session</label>
                    <select class="form-select w-50" id="replaySessionSelect"></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">JSON Message Array</label>
                    <textarea class="form-control text-monospace" id="replayJson" rows="8">[
  { "35": "D", "11": "ORD123", "55": "AAPL", "54": "1", "38": "100", "40": "2", "44": "150.5" }
]</textarea>
                </div>
                <button class="btn btn-warning" onclick="replayMessages()">Run Replay</button>
            </div>

            <!-- Tests Tab -->
            <div class="tab-pane fade" id="tests" role="tabpanel">
                <button class="btn btn-primary mb-3" onclick="runTests()">▶ Run All Cucumber Tests</button>
                <pre id="testOutput" class="bg-dark text-light p-3 rounded" style="min-height: 200px;">Test output will appear here...</pre>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
