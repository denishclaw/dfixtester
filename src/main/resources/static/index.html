<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFixTester Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4 mb-5">
    <h1 class="mb-4">DFixTester</h1>
    
    <h3>Active Sessions</h3>
    <table class="table table-bordered table-striped" id="sessionTable">
        <thead class="table-dark">
            <tr>
                <th>Session String</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <hr class="my-4">
    
    <h3>Send Message</h3>
    <div class="mb-3 w-50">
        <label for="sendSessionSelect" class="form-label">Target Session:</label>
        <select id="sendSessionSelect" class="form-select"></select>
    </div>
    <div id="tagRows"></div>
    <button class="btn btn-outline-secondary mb-3" onclick="addTagRow()">+ Add Another Tag</button>
    <br>
    <button class="btn btn-primary" onclick="sendMessage()">Send Message</button>

    <hr class="my-4">
    
    <h3>Replay Messages</h3>
    <div class="mb-3 w-50">
        <label for="replaySessionSelect" class="form-label">Target Session:</label>
        <select id="replaySessionSelect" class="form-select"></select>
    </div>
    <div class="mb-3 w-75">
        <label for="replayJson" class="form-label">Messages JSON Payload:</label>
        <textarea id="replayJson" class="form-control text-monospace" rows="5" placeholder='[{"35":"D", "55":"AAPL", "54":"1"}]'></textarea>
    </div>
    <button class="btn btn-warning" onclick="replayMessages()">Replay Messages</button>

    <hr class="my-4">
    
    <h3>Run Tests</h3>
    <button class="btn btn-info mb-3" onclick="runTests()">Trigger Cucumber Tests</button>
    <pre id="testOutput" class="bg-light p-3 border rounded"></pre>

    <script src="/app.js"></script>
</body>
</html>
